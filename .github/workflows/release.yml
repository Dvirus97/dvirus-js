name: Release
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    # Skip release commits to avoid infinite loop
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release)') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # Use a PAT so the version commit can be pushed to protected main branch
          # and so the pushed commit triggers subsequent workflows
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org/'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bunx nx run-many -t lint test build

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Version + changelog + commit + tag (no publish yet)
      - run: bunx nx release --skip-publish --specifier=patch
        env:
          GITHUB_TOKEN: ${{ github.token }}

      # Push version commit and tags back to main
      - run: git push --follow-tags

      # Bun publish in CI reads NPM_CONFIG_TOKEN.
      - run: bun pm whoami
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish to npm
      - run: bunx nx release publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
